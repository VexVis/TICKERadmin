<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SELT Control Panel - Windows XP</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Tahoma", "Segoe UI", sans-serif;
    }

    body {
      background: #0055ea;
      background-image: radial-gradient(circle at 50% 30%, #3a83ff 0%, #0055ea 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 15px;
    }

    .xp-window {
      width: 100%;
      max-width: 480px;
      background: #ece9d8;
      border: 3px solid #0055ea;
      border-radius: 8px 8px 0 0;
      box-shadow: 4px 4px 20px rgba(0, 0, 0, 0.6);
      overflow: hidden;
    }

    .xp-titlebar {
      background: linear-gradient(to bottom, 
        #0058ee 0%, 
        #3593ff 4%, 
        #288efb 6%, 
        #0055ea 10%, 
        #0055ea 90%, 
        #0042b7 95%, 
        #002479 100%);
      padding: 6px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
      font-weight: bold;
      font-size: 12px;
      text-shadow: 1px 1px 1px #000;
      border-bottom: 1px solid #002479;
    }

    .xp-btn-close {
      width: 21px;
      height: 21px;
      background: linear-gradient(to bottom, #e7664e 0%, #c1341d 100%);
      border: 1px solid #ffffff;
      border-radius: 3px;
      color: white;
      font-size: 12px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 1px 1px 0 rgba(255,255,255,0.5);
      cursor: pointer;
    }

    .xp-content {
      padding: 15px;
    }

    .xp-fieldset {
      border: 1px solid #d0ccc0;
      border-radius: 4px;
      padding: 12px;
      margin-bottom: 12px;
      background: #f7f5ef;
    }

    legend {
      font-size: 11px;
      font-weight: bold;
      color: #0d286a;
      padding: 0 4px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: bold;
      color: #333;
      margin-top: 6px;
      margin-bottom: 3px;
    }

    input[type="text"], input[type="file"], select {
      width: 100%;
      padding: 6px;
      font-size: 12px;
      border-top: 2px solid #716f64;
      border-left: 2px solid #716f64;
      border-right: 1px solid #f1efe2;
      border-bottom: 1px solid #f1efe2;
      background: #ffffff;
      outline: none;
    }

    select {
      cursor: pointer;
      font-weight: bold;
      color: #0d286a;
    }

    input[type="file"] {
      padding: 3px;
      background: #ece9d8;
      font-size: 11px;
    }

    .divider {
      text-align: center;
      font-size: 10px;
      color: #716f64;
      margin: 8px 0;
      font-weight: bold;
    }

    .preview-box {
      width: 100%;
      height: 90px;
      border: 1px solid #a0a0a0;
      margin-top: 6px;
      border-radius: 3px;
      object-fit: cover;
      display: block;
      background: #e0e0e0;
    }

    .xp-button {
      width: 100%;
      padding: 10px;
      background: linear-gradient(to bottom, #ffffff 0%, #ece9d8 86%, #d8d0c2 100%);
      border: 1px solid #003c74;
      border-radius: 3px;
      color: #000;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: inset -1px -1px 1px #a8a295, inset 1px 1px 1px #ffffff;
      margin-top: 5px;
    }

    .xp-button:hover {
      background: linear-gradient(to bottom, #fff8e5 0%, #fbe8bf 86%, #e0c283 100%);
      border-color: #e59700;
    }

    .xp-button:active {
      background: #dbceb9;
      box-shadow: inset 1px 1px 2px #716f64;
    }

    .xp-statusbar {
      border-top: 1px solid #d0ccc0;
      padding: 6px 10px;
      font-size: 11px;
      background: #ece9d8;
      color: #444;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .xp-status-icon {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #999;
    }
  </style>
</head>
<body>

  <div class="xp-window">
    <div class="xp-titlebar">
      <span>SELT Control Panel v2.0</span>
      <div class="xp-titlebar-buttons">
        <div class="xp-btn-close">X</div>
      </div>
    </div>

    <div class="xp-content">
      
      <!-- TEMPLATE DROPDOWN -->
      <div class="xp-fieldset">
        <legend>Schnell-Templates</legend>
        <label for="templateSelect">Kategorie / Motiv wählen:</label>
        <select id="templateSelect" onchange="applyTemplate()">
          <option value="custom">-- Benutzerdefiniert --</option>
          <option value="breaking">🔴 EILMELDUNG / Akuter Anlass</option>
          <option value="sport">⚽ SPORT / Wettkampf & Ereignis</option>
          <option value="finance">📈 WIRTSCHAFT / Märkte & Finanzen</option>
          <option value="crypto">🪙 KRYPTO / Digitale Assets</option>
          <option value="gaming">🎮 GAMING / Updates & Releases</option>
          <option value="tech">💻 TECHNOLOGIE / Innovationen</option>
          <option value="science">🔬 WISSENSCHAFT / Forschung</option>
          <option value="space">🚀 RAUMFAHRT / Raumfahrt & Kosmos</option>
          <option value="weather">☀️ WETTER / Wetterlage & Warnung</option>
          <option value="elections">🗳️ WAHLEN / Politik & Abstimmung</option>
          <option value="culture">🎬 KULTUR / Event & Unterhaltung</option>
          <option value="traffic">🚗 VERKEHR / Lage & Meldungen</option>
        </select>
      </div>

      <!-- TEXTE -->
      <div class="xp-fieldset">
        <legend>Inhalte</legend>
        <label for="category">Kategorie-Tag:</label>
        <input type="text" id="category" value="AKTUELLE LAGE">

        <label for="headline">Haupt-Schlagzeile:</label>
        <input type="text" id="headline" placeholder="Haupt-Schlagzeile eingeben...">

        <label for="subheadline">Unter-Schlagzeile / Details:</label>
        <input type="text" id="subheadline" placeholder="Unter-Schlagzeile eingeben...">
      </div>

      <!-- BILD -->
      <div class="xp-fieldset">
        <legend>Vorschaubild</legend>
        <label for="imageFile">Datei hochladen (vom Gerät):</label>
        <input type="file" id="imageFile" accept="image/*" onchange="handleFilePreview(this)">

        <div class="divider">- ODER -</div>

        <label for="imageUrl">Bild-URL direkt eingeben:</label>
        <input type="text" id="imageUrl" placeholder="https://..." oninput="updatePreview(this.value)">

        <label>Vorschau:</label>
        <img id="imgPreview" class="preview-box" src="https://images.unsplash.com/photo-1585829365295-ab7cd400c167?w=400&auto=format&fit=crop" alt="Vorschau">
      </div>

      <button class="xp-button" onclick="handleSend()">[ OK ] Senden & Live Schalten</button>
    </div>

    <div class="xp-statusbar">
      <div class="xp-status-icon" id="statusDot"></div>
      <span id="statusText">Bereit.</span>
    </div>
  </div>

  <script>
    const JSONBIN_ID = "6a61eac2da38895dfe83be0f";
    const JSONBIN_KEY = "$2a$10$aO50DKIMLJQqyrbsF2NU4OZRaFCZzhe7gCfdxVgOUFdwT0esiNc1e";
    const IMGBB_API_KEY = "70bf30d211974da33a7dc575513e96bc";

    // Allgemeine, vollkommen universelle Presets ohne spezifische Beispiele
    const templates = {
      breaking: {
        category: "EILMELDUNG",
        headline: "WICHTIGE ENTWICKLUNG ZUR AKTUELLEN LAGE",
        subheadline: "Alle Informationen und Hintergründe im Überblich",
        imageUrl: "https://images.unsplash.com/photo-1585829365295-ab7cd400c167?w=400&auto=format&fit=crop"
      },
      sport: {
        category: "SPORT",
        headline: "ENTSCHEIDUNG IM AKTUELLEN WETTKAMPF GEFALLEN",
        subheadline: "Ergebnisse und Highlights des Spieltags",
        imageUrl: "https://images.unsplash.com/photo-1508098682722-e99c43a406b2?w=400&auto=format&fit=crop"
      },
      finance: {
        category: "WIRTSCHAFT",
        headline: "NEUE BEWEGUNG AN DEN INTERNATIONALEN MÄRKTEN",
        subheadline: "Analysen und Reaktionen zur aktuellen Marktlage",
        imageUrl: "https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?w=400&auto=format&fit=crop"
      },
      crypto: {
        category: "KRYPTO",
        headline: "KURSBEWEGUNGEN BEI DIGITALEN WÄHRUNGEN",
        subheadline: "Aktuelle Marktdaten und Reaktionen der Anleger",
        imageUrl: "https://images.unsplash.com/photo-1518770660439-4636190af475?w=400&auto=format&fit=crop"
      },
      gaming: {
        category: "GAMING",
        headline: "NEUES UPDATE UND INHALTE FREIGESCHALTET",
        subheadline: "Alle Änderungen und Neuerungen in der Übersicht",
        imageUrl: "https://images.unsplash.com/photo-1542751371-adc38448a05e?w=400&auto=format&fit=crop"
      },
      tech: {
        category: "TECHNOLOGIE",
        headline: "NEUE INNOVATION VORGESTELLT UND PREPRÄSENTIERT",
        subheadline: "Funktionen und Zukunftsaussichten im Fokus",
        imageUrl: "https://images.unsplash.com/photo-1518770660439-4636190af475?w=400&auto=format&fit=crop"
      },
      science: {
        category: "WISSENSCHAFT",
        headline: "NEUE ERKENNTNISSE AUS DER AKTUELLEN FORSCHUNG",
        subheadline: "Ergebnisse der wissenschaftlichen Untersuchungen",
        imageUrl: "https://images.unsplash.com/photo-1532187863486-abf9dbad1b69?w=400&auto=format&fit=crop"
      },
      space: {
        category: "RAUMFAHRT",
        headline: "FORTSCHRITTE BEI DER AKTUELLEN WELTRAUMMISSION",
        subheadline: "Neue Daten und Bilder aus dem Orbit eingetroffen",
        imageUrl: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=400&auto=format&fit=crop"
      },
      weather: {
        category: "WETTERWARNUNG",
        headline: "WICHTIGE HINWEISE ZUR AKTUELLEN WETTERLAGE",
        subheadline: "Regionale Entwicklungen und Vorhersagen",
        imageUrl: "https://images.unsplash.com/photo-1515694346937-94d85e41e6f0?w=400&auto=format&fit=crop"
      },
      elections: {
        category: "POLITIK",
        headline: "OFFIZIELLE ERGEBNISSE UND PROGNOSEN VORLIEGEND",
        subheadline: "Reaktionen und weitere Schritte im Überblick",
        imageUrl: "https://images.unsplash.com/photo-1540910419892-4a36d2c3266c?w=400&auto=format&fit=crop"
      },
      culture: {
        category: "KULTUR",
        headline: "GROSSVERANSTALTUNG ERFOLGREICH GESTARTET",
        subheadline: "Programmübersicht und Highlights des Tages",
        imageUrl: "https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=400&auto=format&fit=crop"
      },
      traffic: {
        category: "VERKEHR",
        headline: "AKTUELLER HINWEIS ZUR VERKEHRSSITUATION",
        subheadline: "Beinträchtigungen und Ausweichrouten beachten",
        imageUrl: "https://images.unsplash.com/photo-1506521781263-d8422e82f27a?w=400&auto=format&fit=crop"
      }
    };

    function applyTemplate() {
      const select = document.getElementById("templateSelect");
      const val = select.value;
      
      if (val !== "custom" && templates[val]) {
        document.getElementById("category").value = templates[val].category;
        document.getElementById("headline").value = templates[val].headline;
        document.getElementById("subheadline").value = templates[val].subheadline;
        document.getElementById("imageUrl").value = templates[val].imageUrl;
        updatePreview(templates[val].imageUrl);
      }
    }

    function updatePreview(url) {
      if (url && url.trim() !== "") {
        document.getElementById("imgPreview").src = url;
      }
    }

    function handleFilePreview(input) {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
          document.getElementById("imgPreview").src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    async function handleSend() {
      const category = document.getElementById("category").value;
      const headline = document.getElementById("headline").value;
      const subheadline = document.getElementById("subheadline").value;
      const imageUrlInput = document.getElementById("imageUrl").value;
      const fileInput = document.getElementById("imageFile");
      
      updateStatus("Verarbeite Daten...", "#e59700");

      let finalImageUrl = imageUrlInput;

      if (fileInput.files.length > 0) {
        updateStatus("Lade Bild hoch...", "#0055ea");
        const uploadedUrl = await uploadImageToImgBB(fileInput.files[0]);
        if (uploadedUrl) {
          finalImageUrl = uploadedUrl;
        } else {
          updateStatus("Bild-Upload fehlgeschlagen!", "#cc0000");
          return;
        }
      }

      updateStatus("Aktualisiere OBS...", "#0055ea");
      const success = await sendToJSONBin(category, headline, subheadline, finalImageUrl);

      if (success) {
        updateStatus("Live geschaltet!", "#10b981");
        fileInput.value = "";
      } else {
        updateStatus("Sende-Fehler!", "#cc0000");
      }
    }

    async function uploadImageToImgBB(file) {
      const formData = new FormData();
      formData.append("image", file);

      try {
        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
          method: "POST",
          body: formData
        });
        const data = await res.json();
        if (data.success) {
          return data.data.display_url || data.data.url;
        }
      } catch (e) {
        console.error("Upload Fehler:", e);
      }
      return null;
    }

    async function sendToJSONBin(category, headline, subheadline, imageUrl) {
      try {
        const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            "X-Master-Key": JSONBIN_KEY
          },
          body: JSON.stringify({ category, headline, subheadline, imageUrl })
        });

        if (!response.ok) {
          console.error("HTTP Fehler:", response.status);
          return false;
        }

        return true;
      } catch (err) {
        console.error("JSONBin Fehler:", err);
        return false;
      }
    }

    function updateStatus(text, color) {
      document.getElementById("statusText").textContent = text;
      document.getElementById("statusDot").style.background = color;
    }
  </script>
</body>
</html>
